name: Update World Cup Data

on:
  workflow_dispatch:
    inputs:
      with_squads:
        description: "Also fetch squad/lineup data for all teams (slow, ~10+ min)"
        type: boolean
        default: false
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest World Cup data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.with_squads }}" = "true" ]; then
            node fetch-data.mjs --with-squads
          else
            node fetch-data.mjs
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.json"
          git diff --staged --quiet || git commit -m "Update World Cup data [skip ci]"
          git push
